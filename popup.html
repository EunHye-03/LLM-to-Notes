<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>LLM to Notion</title>
    <style>
      body { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 280px; padding: 12px; }
      label { display: block; margin-top: 8px; font-weight: 600; }
      input { width: 100%; padding: 6px 8px; margin-top: 4px; box-sizing: border-box; }
      button { margin-top: 12px; padding: 8px 12px; width: 100%; cursor: pointer; }
      .status { margin-top: 8px; color: #555; min-height: 16px; }
    </style>
  </head>
  <body>
    <label for="token">Notion Integration Token</label>
    <input id="token" type="password" placeholder="secret_..." />

    <label for="db">Database ID</label>
    <input id="db" type="text" placeholder="xxxxxxxxxxxx" />

    <button id="save">Save settings</button>
    <div class="status" id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
